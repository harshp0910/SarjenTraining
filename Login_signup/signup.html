<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
</head>

<body>
    <div class="login-box">
        <label for="">Username:</label>
        <input type="text" id="user">
        <br>
        <label for="">Password:</label>
        <input type="text" id="pass">
        <br>
        <label for="">Confirm Password</label>
        <input type="password" id="final_pass">
        <br>
        <button onclick="login()">Register</button>
    </div>
    <script>
        var user_name = document.getElementById("user")
        var password = document.getElementById("pass")
        var confirm_password = document.getElementById("final_pass")

        function login() {

            if (!user_name.value || !password.value || !confirm_password.value) {
                alert("All fields are required!");
                return;
            }
            else if (password.value == confirm_password.value) {
                document.writeln("Hii " + user_name.value)
                localStorage.setItem("username", user_name.value);
                localStorage.setItem("password", password.value);
            }
            else {
                alert("Diffrent passwords!!")
            }
        }
    </script>
</body>

</html>
